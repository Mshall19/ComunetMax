# Resilience4j Circuit Breaker para Contacto
# Asegºrate que en Java sea: @CircuitBreaker(name = "contactoCB")
resilience4j.circuitbreaker.instances.contactoCB.register-health-indicator=true
resilience4j.circuitbreaker.instances.contactoCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.contactoCB.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.contactoCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.contactoCB.wait-duration-in-open-state=20s

# Time Limiter para Contacto
resilience4j.timelimiter.instances.contactoCB.timeout-duration=3s