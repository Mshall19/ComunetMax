server.port=8083
mensaje.prueba=Configuraciµn desde el Server para Usuarios

# BASE DE DATOS (Ruta para Docker)
spring.datasource.url=jdbc:postgresql://comunet-postgres:5432/db_usuarios
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# FLYWAY
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# RESILIENCE4J - CIRCUIT BREAKER
# Asegºrate que en Java sea: @CircuitBreaker(name = "usuariosCB")
resilience4j.circuitbreaker.instances.usuariosCB.register-health-indicator=true
resilience4j.circuitbreaker.instances.usuariosCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.usuariosCB.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.usuariosCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.usuariosCB.wait-duration-in-open-state=20s

# TIME LIMITER
resilience4j.timelimiter.instances.usuariosCB.timeout-duration=3s