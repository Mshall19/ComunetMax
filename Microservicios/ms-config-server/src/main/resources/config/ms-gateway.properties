server.port=8080
management.endpoints.web.exposure.include=*
spring.cloud.gateway.discovery.locator.enabled=true

# --- ms-planes ---
spring.cloud.gateway.routes[0].id=ms-planes
spring.cloud.gateway.routes[0].uri=http://comunet-planes:8080
spring.cloud.gateway.routes[0].predicates[0]=Path=/ms-planes/**
spring.cloud.gateway.routes[0].filters[0].name=AuthenticationFilter
spring.cloud.gateway.routes[0].filters[1].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[1].args.name=planesCB
spring.cloud.gateway.routes[0].filters[1].args.fallbackUri=forward:/fallback/planes
spring.cloud.gateway.routes[0].filters[2].name=StripPrefix
spring.cloud.gateway.routes[0].filters[2].args._genkey_0=1

# --- ms-usuarios ---
spring.cloud.gateway.routes[1].id=ms-usuarios
spring.cloud.gateway.routes[1].uri=http://comunet-usuarios:8080
spring.cloud.gateway.routes[1].predicates[0]=Path=/ms-usuarios/**
spring.cloud.gateway.routes[1].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.name=usuariosCB
spring.cloud.gateway.routes[1].filters[0].args.fallbackUri=forward:/fallback/usuarios

spring.cloud.gateway.routes[1].filters[1].name=StripPrefix
spring.cloud.gateway.routes[1].filters[1].args._genkey_0=1

# --- ms-contacto ---
spring.cloud.gateway.routes[2].id=ms-contacto
spring.cloud.gateway.routes[2].uri=http://comunet-contacto:8080
spring.cloud.gateway.routes[2].predicates[0]=Path=/ms-contacto/**
spring.cloud.gateway.routes[2].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[2].filters[0].args.name=contactoCB
spring.cloud.gateway.routes[2].filters[0].args.fallbackUri=forward:/fallback/contacto
spring.cloud.gateway.routes[2].filters[1].name=StripPrefix
spring.cloud.gateway.routes[2].filters[1].args._genkey_0=1

# --- ms-cobertura ---
spring.cloud.gateway.routes[3].id=ms-cobertura
spring.cloud.gateway.routes[3].uri=http://comunet-cobertura:8080
spring.cloud.gateway.routes[3].predicates[0]=Path=/ms-cobertura/**

# Filtro 0: Seguridad (Aseg˙rate que el nombre sea AuthenticationFilter)
spring.cloud.gateway.routes[3].filters[0].name=AuthenticationFilter

# Filtro 1: StripPrefix (Sintaxis corregida)
spring.cloud.gateway.routes[3].filters[1].name=StripPrefix
spring.cloud.gateway.routes[3].filters[1].args._genkey_0=1

# Filtro 2: CircuitBreaker (Sintaxis corregida)
spring.cloud.gateway.routes[3].filters[2].name=CircuitBreaker
spring.cloud.gateway.routes[3].filters[2].args.name=coberturaCB
spring.cloud.gateway.routes[3].filters[2].args.fallbackUri=forward:/fallback/cobertura