server.port=8080
management.endpoints.web.exposure.include=*
spring.cloud.gateway.discovery.locator.enabled=true

# --- ms-planes ---
spring.cloud.gateway.routes[0].id=ms-planes
spring.cloud.gateway.routes[0].uri=http://comunet-planes:8080
spring.cloud.gateway.routes[0].predicates[0]=Path=/ms-planes/**
spring.cloud.gateway.routes[0].filters[0].name=AuthenticationFilter
spring.cloud.gateway.routes[0].filters[1].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[1].args.name=planesCB
spring.cloud.gateway.routes[0].filters[1].args.fallbackUri=forward:/fallback/planes
spring.cloud.gateway.routes[0].filters[2].name=StripPrefix
spring.cloud.gateway.routes[0].filters[2].args._genkey_0=1
springdoc.swagger-ui.urls[0].name=Cobertura
springdoc.swagger-ui.urls[0].url=/ms-cobertura/v3/api-docs


# --- ms-usuarios ---
spring.cloud.gateway.routes[1].id=ms-usuarios
