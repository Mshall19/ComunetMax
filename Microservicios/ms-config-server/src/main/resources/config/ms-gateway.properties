# --- ms-cobertura ---
spring.cloud.gateway.routes[3].id=ms-cobertura
spring.cloud.gateway.routes[3].uri=http://comunet-cobertura:8080
spring.cloud.gateway.routes[3].predicates[0]=Path=/ms-cobertura/**
spring.cloud.gateway.routes[3].filters[0].name=AuthenticationFilter
spring.cloud.gateway.routes[3].filters[1].name=StripPrefix
spring.cloud.gateway.routes[3].filters[1].args._genkey_0=1
spring.cloud.gateway.routes[3].filters[2].name=CircuitBreaker
spring.cloud.gateway.routes[3].filters[2].args.name=coberturaCB
