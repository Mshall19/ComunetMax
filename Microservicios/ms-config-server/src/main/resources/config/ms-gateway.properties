spring.cloud.gateway.routes[1].filters[0].args.name=usuariosCB
spring.cloud.gateway.routes[1].filters[0].args.fallbackUri=forward:/fallback/usuarios
spring.cloud.gateway.routes[1].filters[1].name=StripPrefix
spring.cloud.gateway.routes[1].filters[1].args._genkey_0=1
springdoc.swagger-ui.urls[1].name=Usuarios
springdoc.swagger-ui.urls[1].url=/ms-usuarios/v3/api-docs

