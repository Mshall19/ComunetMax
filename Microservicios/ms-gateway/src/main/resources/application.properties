spring.application.name=ms-gateway
spring.config.import=optional:configserver:http://ms-config-server:8888
spring.cloud.circuitbreaker.resilience4j.enabled=true
resilience4j.timelimiter.configs.default.timeout-duration=2s
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
spring.cloud.gateway.forwarded.enabled=true
logging.level.org.springframework.cloud.gateway=TRACE
logging.level.io.github.resilience4j=DEBUG
logging.level.org.springframework.cloud.config.client=DEBUG
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true